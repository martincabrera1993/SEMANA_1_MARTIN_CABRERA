<html lang="es">
<head>
  <title>Mi Calculadora</title>
  <style>
    body {
      font-family:Verdana, Geneva, Cambria, Cochin, Georgia, Times, 'Times New Roman', serif, sans-serif, Times, serif, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: white;
    }
    .calculadora {
      background: red;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px black;
    }
    #pantalla {
      width: 100%;
      height: 50px;
      margin-bottom: 10px;
      text-align: right;
      font-size: 20px;
      padding: 5px;
      border: none;
      border-radius: 5px;
    }
    .botones {
      display: grid;
      grid-template-columns: repeat(4, 60px);
      gap: 10px;
    }
    button {
      height: 50px;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: black;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="calculadora">
     <p style="text-align: center; color: black;">
  MI CALCULADORA
</p>

    <input type="text" id="pantalla" disabled>
    <div class="botones">
      <button onclick="agregar('7')">7</button>
      <button onclick="agregar('8')">8</button>
      <button onclick="agregar('9')">9</button>
      <button onclick="agregar('/')">÷</button>

      <button onclick="agregar('4')">4</button>
      <button onclick="agregar('5')">5</button>
      <button onclick="agregar('6')">6</button>
      <button onclick="agregar('*')">×</button>

      <button onclick="agregar('1')">1</button>
      <button onclick="agregar('2')">2</button>
      <button onclick="agregar('3')">3</button>
      <button onclick="agregar('-')">−</button>

      <button onclick="agregar('0')">0</button>
      <button onclick="agregar('.')">.</button>
      <button onclick="calcular()">=</button>
      <button onclick="agregar('+')">+</button>

      <button onclick="limpiar()"style="grid-column: span 4; background: black; color: white;">C</button>
      <button onclick="window.location.href='index.html'">Volver atrás</button>
  </div>

  <script>
    function agregar(valor) {
      document.getElementById("pantalla").value += valor;
    }
    function calcular() {
      try {
        document.getElementById("pantalla").value = eval(document.getElementById("pantalla").value);
      } catch {
        document.getElementById("pantalla").value = "Error";
      }
    }
    function limpiar() {
      document.getElementById("pantalla").value = "";
    }
  </script>

</body>
</html>
